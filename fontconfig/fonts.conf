<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Nerd Font symbol fallback -->
  <include>/usr/share/fontconfig/conf.avail/10-nerd-font-symbols.conf</include>

  <!-- Block all system CJK monospace fonts to let Sarasa win -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans Mono CJK KR</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans Mono CJK SC</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans Mono CJK TC</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans Mono CJK JP</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans Mono CJK HK</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>文泉驿等宽正黑</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>文泉驿正黑</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>WenQuanYi Zen Hei</string></patelt>
      </pattern>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>WenQuanYi Zen Hei Mono</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!-- Append Sarasa as CJK fallback -->
  <alias>
    <family>CaskaydiaCove Nerd Font Mono</family>
    <default>
      <family>Sarasa Term SC</family>
    </default>
  </alias>

  <alias>
    <family>Cascadia Mono</family>
    <default>
      <family>Sarasa Term SC</family>
    </default>
  </alias>

  <alias>
    <family>monospace</family>
    <default>
      <family>Sarasa Term SC</family>
    </default>
  </alias>

  <!-- System UI CJK -->
  <alias>
    <family>sans-serif</family>
    <default>
      <family>Sarasa UI SC</family>
      <family>Noto Sans CJK SC</family>
    </default>
  </alias>

  <alias>
    <family>serif</family>
    <default>
      <family>Sarasa Gothic SC</family>
      <family>Noto Serif CJK SC</family>
    </default>
  </alias>

</fontconfig>
